  <rect x="60" y="276" width="176" height="176" rx="16" fill="#1e2229" stroke="#2e3545" stroke-width="3"/>
  <rect x="276" y="276" width="176" height="176" rx="16" fill="#1e2229" stroke="#2e3545" stroke-width="3"/>
  <!-- Accent lines inside panels -->
  <rect x="80" y="108" width="136" height="6" rx="3" fill="#e8a020"/>
  <rect x="80" y="124" width="96" height="4" rx="2" fill="#2e3545"/>
  <rect x="80" y="136" width="116" height="4" rx="2" fill="#2e3545"/>
  <rect x="80" y="148" width="76" height="4" rx="2" fill="#2e3545"/>
  <!-- Calendar icon in top-right panel -->
  <rect x="296" y="85" width="136" height="112" rx="8" fill="#252b34"/>
  <rect x="296" y="85" width="136" height="24" rx="8" fill="#4a9eff"/>
  <rect x="296" y="97" width="136" height="12" fill="#4a9eff"/>
  <rect x="308" y="120" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="332" y="120" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="356" y="120" width="16" height="14" rx="3" fill="#e8a020"/>
  <rect x="380" y="120" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="308" y="142" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="332" y="142" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="356" y="142" width="16" height="14" rx="3" fill="#2e3545"/>
  <rect x="380" y="142" width="16" height="14" rx="3" fill="#2e3545"/>
  <!-- Progress bars in bottom-left panel -->
  <rect x="80" y="308" width="136" height="6" rx="3" fill="#252b34"/>
  <rect x="80" y="308" width="100" height="6" rx="3" fill="#3ecf8e"/>
  <rect x="80" y="324" width="136" height="6" rx="3" fill="#252b34"/>
  <rect x="80" y="324" width="60" height="6" rx="3" fill="#4a9eff"/>
  <rect x="80" y="340" width="136" height="6" rx="3" fill="#252b34"/>
  <rect x="80" y="340" width="116" height="6" rx="3" fill="#e8a020"/>
  <rect x="80" y="356" width="136" height="6" rx="3" fill="#252b34"/>
  <rect x="80" y="356" width="40" height="6" rx="3" fill="#e05252"/>
  <!-- Time block in bottom-right panel -->
  <rect x="296" y="296" width="136" height="26" rx="6" fill="#a78bfa" opacity="0.8"/>
  <rect x="296" y="330" width="136" height="26" rx="6" fill="#e8a020" opacity="0.8"/>
  <rect x="296" y="364" width="80" height="26" rx="6" fill="#3ecf8e" opacity="0.8"/>
