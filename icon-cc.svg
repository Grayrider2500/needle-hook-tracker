<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0d0e10"/>
  <!-- Grid of 4 panels -->
  <rect x="60" y="60" width="176" height="176" rx="16" fill="#1e2229" stroke="#2e3545" stroke-width="3"/>
