<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a0c4ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a0c4ff;
    }

    .cell.win {
      background: #0f3460;
      border-color: #a0c4ff;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #0f3460;
      color: #eee;
      border: 2px solid #a0c4ff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover {
      background: #1a4a8a;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a0c4ff; }
    .score-item.draw-score span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-item x-score">X<span id="x-wins">0</span></div>
    <div class="score-item draw-score">Draws<span id="draws">0</span></div>
    <div class="score-item o-score">O<span id="o-wins">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const drawsEl = document.getElementById('draws');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let score = { X: 0, O: 0, draw: 0 };

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: null, draw: true };
      return null;
    }

    function handleClick(e) {
      const i = +e.target.dataset.index;
      if (gameOver || board[i]) return;

      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${result.winner} wins!`;
          score[result.winner]++;
        } else {
          status.textContent = "It's a draw!";
          score.draw++;
        }
        xWinsEl.textContent = score.X;
        oWinsEl.textContent = score.O;
        drawsEl.textContent = score.draw;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }

    function reset() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
